# GitHub Pages へ静的ページを自動公開する。
# main への push で発火（手動実行も可）。サーバー（server/）やテスト（tests/）は含めない。
# リポジトリ設定の Pages ソースを「GitHub Actions」にしておくこと。
name: Deploy page to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ（実行中の公開はキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage static files
        run: |
          mkdir -p _site
          cp index.html styles.css config.js _site/
          cp -r src _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # Pages 未有効でも API で自動有効化（pages: write 権限を使用）

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
