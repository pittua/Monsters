<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" fill="none" font-family="'Baloo 2','Trebuchet MS',Verdana,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1018"/>
      <stop offset="1" stop-color="#090a10"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.12" cy="-0.1" r="0.7">
      <stop offset="0" stop-color="#6d7bff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6d7bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1" cy="0" r="0.7">
      <stop offset="0" stop-color="#b14bff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#b14bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0.5" cy="1.2" r="0.6">
      <stop offset="0" stop-color="#4cc2ff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4cc2ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc2ff"/>
      <stop offset="0.45" stop-color="#6d7bff"/>
      <stop offset="1" stop-color="#f72585"/>
    </linearGradient>
    <linearGradient id="dieFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#e6e6ee"/>
      <stop offset="1" stop-color="#cfcfdb"/>
    </linearGradient>
    <radialGradient id="pip" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="0.75" stop-color="#c0121b"/>
    </radialGradient>
    <radialGradient id="pipDark" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#555"/>
      <stop offset="0.75" stop-color="#161616"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <rect width="1280" height="400" fill="url(#glow1)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>
  <rect width="1280" height="400" fill="url(#glow3)"/>
  <rect x="0.5" y="0.5" width="1279" height="399" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Dice cluster on the right -->
  <g filter="url(#soft)" transform="translate(1040 200)">
    <!-- back die -->
    <g transform="translate(120 -34) rotate(14)">
      <rect x="-66" y="-66" width="132" height="132" rx="26" fill="url(#dieFace)"/>
      <circle cx="-30" cy="-30" r="11" fill="url(#pipDark)"/>
      <circle cx="30" cy="-30" r="11" fill="url(#pipDark)"/>
      <circle cx="-30" cy="30" r="11" fill="url(#pipDark)"/>
      <circle cx="30" cy="30" r="11" fill="url(#pip)"/>
      <circle cx="0" cy="0" r="11" fill="url(#pipDark)"/>
    </g>
    <!-- front die -->
    <g transform="translate(-30 24) rotate(-10)">
      <rect x="-78" y="-78" width="156" height="156" rx="30" fill="url(#dieFace)"/>
      <circle cx="0" cy="0" r="13" fill="url(#pip)"/>
      <circle cx="-40" cy="-40" r="13" fill="url(#pipDark)"/>
      <circle cx="40" cy="40" r="13" fill="url(#pipDark)"/>
    </g>
  </g>

  <!-- Title block on the left -->
  <text x="96" y="176" font-size="118" font-weight="800" letter-spacing="6" fill="url(#title)">MONSTERS</text>
  <text x="100" y="232" font-size="27" font-weight="600" letter-spacing="1.5" fill="#c7cde6">サイコロの出目で戦う、バトルえんぴつ風モンスター対戦</text>

  <!-- feature chips -->
  <g font-size="22" font-weight="700" fill="#dfe3f5">
    <g transform="translate(100 282)">
      <rect width="232" height="46" rx="23" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="116" y="30" text-anchor="middle">⚡ インストール不要</text>
    </g>
    <g transform="translate(348 282)">
      <rect width="232" height="46" rx="23" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="116" y="30" text-anchor="middle">🧬 自作モンスター</text>
    </g>
    <g transform="translate(596 282)">
      <rect width="216" height="46" rx="23" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="108" y="30" text-anchor="middle">🌐 オンライン対戦</text>
    </g>
  </g>
</svg>
